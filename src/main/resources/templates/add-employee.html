<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-5">
    <h2 class="text-center mb-4">Add / Update Employee</h2>

    <form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Department</label>
            <input type="text" th:field="*{department}" class="form-control" placeholder="Enter department"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Salary</label>
            <input type="number" th:field="*{salary}" class="form-control" placeholder="Enter salary"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email"/>
        </div>

        <button type="submit" class="btn btn-success">Save Employee</button>
        <a th:href="@{/}" class="btn btn-secondary">Cancel</a>

    </form>
</div>
</body>
</html>
